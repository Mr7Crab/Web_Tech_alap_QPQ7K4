<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felhasználó keresés</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    nav {
      background: #24292f;
      padding: 16px 24px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-right: 18px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #0969da;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #0969da;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0550ae;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .user-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      background: #fafafa;
    }

    .user-card img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .user-card h3 {
      margin: 8px 0;
      font-size: 18px;
    }

    .user-card a {
      text-decoration: none;
      color: #0969da;
      font-weight: bold;
    }

    .user-card a:hover {
      text-decoration: underline;
    }

    .message {
      text-align: center;
      padding: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Főoldal</a>
    <a href="user-search.html">Felhasználó keresés</a>
  </nav>

  <div class="container">
    <h1>GitHub felhasználó keresés</h1>

    <div class="search-box">
      <input
        type="text"
        id="username-input"
        placeholder="Adj meg egy GitHub felhasználónevet..."
      />
      <button id="search-btn">Keresés</button>
    </div>

    <div id="results"></div>
  </div>

  <script src="user-search.js"></script>
</body>
</html>
