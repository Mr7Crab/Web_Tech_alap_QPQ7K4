<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felhasználói adatlap</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: #222;
        }

        .card {
            width: 100%;
            max-width: 700px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #24292f, #57606a);
            color: white;
            text-align: center;
            padding: 32px 20px 24px;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .content {
            padding: 28px;
        }

        .field {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eee;
        }

        .field:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }

        .value {
            font-size: 1rem;
            line-height: 1.5;
            word-break: break-word;
        }

        a {
            color: #0969da;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 10px;
        }

        .stat-box {
            background: #f6f8fa;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            display: block;
            font-size: 1.6rem;
            font-weight: bold;
            color: #24292f;
        }

        .stat-label {
            color: #666;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        .message {
            text-align: center;
            padding: 40px 20px;
            font-size: 1.1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 16px;
            background: #24292f;
            color: white;
            border-radius: 10px;
            text-decoration: none;
        }

        .back-link:hover {
            background: #444c56;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="card" id="app">
        <div class="message">Betöltés...</div>
    </div>

    <script>
        const app = document.getElementById("app");

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function createField(label, value, isLink = false) {
            if (value === null || value === undefined || value === "") {
                return "";
            }

            return `
        <div class="field">
          <span class="label">${label}</span>
          <div class="value">
            ${isLink
                    ? `<a href="${value}" target="_blank">${value}</a>`
                    : value
                }
          </div>
        </div>
      `;
        }

        async function loadUser() {
            const username = getQueryParam("id");

            if (!username) {
                app.innerHTML = `
          <div class="message">
            Nincs megadva felhasználónév az URL-ben.<br>
            Példa: <strong>user.html?id=microsoft</strong><br>
            <a class="back-link" href="user-search.html">Vissza a keresőhöz</a>
          </div>
        `;
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/users/${username}`);

                if (!response.ok) {
                    throw new Error("A felhasználó nem található.");
                }

                const user = await response.json();

                app.innerHTML = `
          <div class="header">
            <img class="avatar" src="${user.avatar_url}" alt="${user.login} avatar" />
            <h1>${user.name || user.login}</h1>
          </div>

          <div class="content">
            ${createField("Név", user.name)}
            ${createField("Blog", user.blog, true)}
            ${createField("Hely", user.location)}
            ${createField("Bio", user.bio)}

            <div class="field">
              <span class="label">Statisztikák</span>
              <div class="stats">
                ${user.public_repos !== null && user.public_repos !== undefined
                        ? `
                      <div class="stat-box">
                        <span class="stat-number">${user.public_repos}</span>
                        <div class="stat-label">Nyilvános repo</div>
                      </div>
                    `
                        : ""
                    }

                ${user.followers !== null && user.followers !== undefined
                        ? `
                      <div class="stat-box">
                        <span class="stat-number">${user.followers}</span>
                        <div class="stat-label">Követő</div>
                      </div>
                    `
                        : ""
                    }
              </div>
            </div>

            <a class="back-link" href="user-search.html">Vissza a keresőhöz</a>
          </div>
        `;
            } catch (error) {
                app.innerHTML = `
          <div class="message">
            Hiba történt: ${error.message}<br>
            <a class="back-link" href="user-search.html">Vissza a keresőhöz</a>
          </div>
        `;
            }
        }

        loadUser();
    </script>
</body>

</html>
